{% if page.meta.comments != false and "blog/" in page.url %}
<h2 id="commentaires">Commentaires</h2>

<div class="giscus"></div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    var scheme = document.body.getAttribute("data-md-color-scheme");
    var theme = scheme === "slate" ? "noborder_dark" : "noborder_light";

    var giscus = document.createElement("script");
    giscus.src = "https://giscus.app/client.js";
    giscus.setAttribute("data-repo", "darcman0/xootayugox.github.io");
    giscus.setAttribute("data-repo-id", "R_kgDOSfasYQ");
    giscus.setAttribute("data-category", "Announcements");
    giscus.setAttribute("data-category-id", "DIC_kwDOSfasYc4C9bGD");
    giscus.setAttribute("data-mapping", "pathname");
    giscus.setAttribute("data-strict", "0");
    giscus.setAttribute("data-reactions-enabled", "1");
    giscus.setAttribute("data-emit-metadata", "0");
    giscus.setAttribute("data-input-position", "bottom");
    giscus.setAttribute("data-theme", theme);
    giscus.setAttribute("data-lang", "fr");
    giscus.setAttribute("crossorigin", "anonymous");
    giscus.async = true;
    document.querySelector(".giscus").appendChild(giscus);

    var observer = new MutationObserver(function() {
      var s = document.body.getAttribute("data-md-color-scheme");
      var t = s === "slate" ? "noborder_dark" : "noborder_light";
      var iframe = document.querySelector("iframe.giscus-frame");
      if (iframe) {
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: t } } },
          "https://giscus.app"
        );
      }
    });
    observer.observe(document.body, { 
      attributes: true, 
      attributeFilter: ["data-md-color-scheme"] 
    });
  });
</script>

{% endif %}
